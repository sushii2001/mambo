services:
  mambo:
    build: .
    image: mambo:local
    container_name: mambo-local
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - WEB_HOST=${WEB_HOST}
      - WEB_PORT=${WEB_PORT}
      - LOGGING_LEVEL=${LOGGING_LEVEL}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs