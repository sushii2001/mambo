services:
  mambo:
    build: .
    image: mambo:local
    container_name: mambo-local
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - WEB_HOST=${WEB_HOST}
      - WEB_PORT=${WEB_PORT}
    volumes:
      - ./logs:/app/logs

  uptime-kuma:
    image: louislam/uptime-kuma:2-slim
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  uptime-kuma-data: